name: CI - Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium  # ✅ only install chromium, faster CI

      # ✅ Catch missing secrets before tests run, fail fast with a clear message
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.APP_USERNAME }}" ]; then
            echo "❌ Secret APP_USERNAME is not set in GitHub repository secrets"
            exit 1
          fi
          if [ -z "${{ secrets.PASSWORD }}" ]; then
            echo "❌ Secret PASSWORD is not set in GitHub repository secrets"
            exit 1
          fi
          echo "✅ All required secrets are present"

      - name: Run tests
        env:
          BASE_URL: https://automationexercise.com
          HEADLESS: "true"   # ✅ quoted string — env vars are always strings
          APP_USERNAME: ${{ secrets.APP_USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          pytest --alluredir=allure-results -q

      - name: Upload Allure results
        if: always()   # ✅ upload even on failure so you can inspect the report
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results